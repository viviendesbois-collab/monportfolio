<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — MonPortfolio</title>
  <meta name="description" content="Articles et retours d'expérience de Haddock sur le développement web.">
  <meta property="og:title" content="Blog — MonPortfolio">
  <meta property="og:description" content="Articles et retours d'expérience de Haddock sur le développement web.">
  <meta property="og:image" content="assets/images/og-image.jpg">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS critique (above-the-fold) en inline : le header s'affiche sans attendre css/style.css.
       Copie exacte d'un sous-ensemble de css/style.css (liste précise des règles : voir le
       commentaire en tête de ce fichier). Toute modification doit être répercutée ICI et dans
       les 3 autres copies : index.html, blog/construire-portfolio-avec-claude-code.html,
       paiement.html. -->
  <style>
    :root {
      --color-bg: #0a0a0a;
      --color-surface: #141414;
      --color-border: #262626;
      --color-text: #e0e0e0;
      --color-muted: #8a8a8a;
      --color-accent: #64ffda;
      --color-header-bg: rgba(10, 10, 10, 0.85);
      --font-base: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --space-md: 1.5rem;
      --header-height: 64px;
      --max-width: 1080px;
    }
    :root[data-theme="light"] {
      --color-bg: #ffffff;
      --color-surface: #f5f5f5;
      --color-border: #e2e2e2;
      --color-text: #1a1a1a;
      --color-muted: #5a5a5a;
      --color-accent: #0a7a5e;
      --color-header-bg: rgba(255, 255, 255, 0.8);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--color-bg); color: var(--color-text); font-family: var(--font-base); font-size: 1.1rem; line-height: 1.7; }
    .container { width: 100%; max-width: var(--max-width); margin: 0 auto; padding-inline: var(--space-md); }
    .header { position: sticky; top: 0; z-index: 100; background-color: var(--color-header-bg); backdrop-filter: blur(8px); border-bottom: 1px solid var(--color-border); }
    .header__inner { display: flex; align-items: center; gap: var(--space-md); height: var(--header-height); }
    .header__logo { margin-right: auto; font-weight: 700; letter-spacing: 0.5px; }
    .header__logo-accent { color: var(--color-accent); }
  </style>
  <link rel="preload" href="css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="css/style.css"></noscript>
  <script>
    // Applique le thème avant le rendu pour éviter tout flash (FOUC)
    (function () {
      const saved = localStorage.getItem("theme");
      const theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
</head>
<body>
  <!-- En-tête / navigation -->
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">Mon<span class="header__logo-accent">Portfolio</span></a>
      <nav class="nav" id="site-nav">
        <a href="index.html#apropos" class="nav__link">À propos</a>
        <a href="index.html#projets" class="nav__link">Projets</a>
        <a href="index.html#actualites" class="nav__link">Actualités</a>
        <a href="blog.html" class="nav__link" aria-current="page">Blog</a>
        <a href="index.html#contact" class="nav__link">Contact</a>
      </nav>
      <button class="theme-toggle" aria-pressed="false" aria-label="Activer le mode clair">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <button class="header__toggle" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="site-nav"><span aria-hidden="true">☰</span></button>
    </div>
  </header>

  <main>
    <!-- Section Blog : la liste est injectée par js/blog.js depuis blog/posts.json -->
    <section class="section reveal">
      <div class="container">
        <h1 class="section__title">Blog</h1>
        <div class="projects__grid" data-blog-grid aria-live="polite"></div>
        <noscript>
          <p class="blog__message">Activez JavaScript pour afficher la liste des articles. Les articles restent accessibles individuellement.</p>
        </noscript>
      </div>
    </section>
  </main>

  <!-- Pied de page -->
  <footer class="footer">
    <div class="container">
      <nav class="footer__links">
        <a href="#" class="footer__link" target="_blank" rel="noopener" aria-label="GitHub (ouvre un nouvel onglet)">GitHub</a>
        <a href="#" class="footer__link" target="_blank" rel="noopener" aria-label="LinkedIn (ouvre un nouvel onglet)">LinkedIn</a>
      </nav>
      <p>&copy; <span data-current-year>2026</span> Haddock — Construit avec Claude Code</p>
    </div>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
